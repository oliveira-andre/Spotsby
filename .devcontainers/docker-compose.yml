name: spotsby
services:
  redis:
    image: redis
    ports:
      - 6379:6379
  db:
    image: postgres:16
    volumes:
      - spotsby_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spotsby_development
    ports:
      - 5432:5432
  web:
    build:
      context: ..
      dockerfile: .devcontainers/Dockerfile
    volumes:
      - ../:/rails
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: postgres://postgres:postgres@db
      DATABASE_CLEANER_ALLOW_REMOTE_DATABASE_URL: true
      REDIS_URL: redis://redis:6379/1
      SELENIUM_REMOTE_HOST: selenium
      SELENIUM_PORT: 4444
    depends_on:
      - db
      - redis
      - selenium
    stdin_open: true
    tty: true
    networks:
      default:
  selenium:
    image: selenium/standalone-chromium:latest
    ports:
      - "4444:4444"
    shm_size: 2g
    environment:
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_NODE_MAX_SESSIONS=5
    volumes:
      - /dev/shm:/dev/shm
    networks:
      default:

volumes:
  spotsby_db_data: