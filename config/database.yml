default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: spotsby_development

test:
  <<: *default
  database: spotsby_test

production:
  primary: &primary_production
    <<: *default
    database: spotsby_production
    username: spotsby
    password: <%= ENV["SPOTSBY_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: spotsby_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: spotsby_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: spotsby_production_cable
    migrations_paths: db/cable_migrate
